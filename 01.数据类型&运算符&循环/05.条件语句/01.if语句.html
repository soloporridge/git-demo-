<body>
    

    <script>

        /* 

            条件分支语句
                根据一个条件来决定是不是执行某一段代码
                分成两种
                    1.if
                    2.switch
            1. if 语句
                四种书写格式
                    1. if(条件){要执行的代码}
                        当条件满足的时候(表达式为true)，{}里面的代码执行
                        当条件不满足的时候(表达式为false)，{}里面代码不执行
                    2. if(条件表达式){要执行的代码}else{要执行的代码}
                        当条件满足的时候，执行if后面的{}
                        当条件不满足的时候，执行else后面的{}
                        两个代码段 必然会执行一个
                     3.if(条件1){条件1要执行的代码}else if(条件2){条件2要执行的代码}
                        从第一个开始，哪一个条件满足，执行那个一个{}里面的代码
                        如果前面的满足了，那么后面的就都不执行了
                        若干个大括号，最多只能执行一个   
                    4.if(条件1){条件1要执行的代码}else if(条件2){条件2要执行的代码} else{所有条件都不满足执行}
                        从第一个开始，哪一个条件满足，执行那个一个{}里的代码
                        然后前面的满足了，后面的都不执行了
                        所有条件都不满足的时候 执行else里的代码
                        若干个{}必然有一个会执行
        */
