    <script>

        /* 
        
            条件语句  switch语句
                条件分支语句的一种
                语法：switch(要判断的变量){
                    case 情况1：
                        情况1执行的代码
                        break
                    case 情况2：
                        情况2要执行的代码
                        break
                    case 情况n...
                        情况n要执行的代码
                        break
                    default：
                        所有条件都不满足的时候执行的代码
                }
                注意：
                    1.每一个case和判断的变量关系必须是===才叫做满足
                    2.switch 语句，只能判断准确的某一个字面量值，不能判断范围
                    3.每一个 case 后面的break
                        当书写 break的时候，执行完毕这个case的内容，就结束了
                        当不写 break的时候，执行完毕这个case的内容，不管下一个case是不是满足都会执行
                        一直遇到一个break为止，或者switch结束
                    4.break的穿透是从第一个，满足条件的case开始进行穿透
                    5.default 可以写可以不写
                        作用类似于 if语句里的else
                        当所有条件都不满足的时候执行default
        */
