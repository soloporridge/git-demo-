<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /*
            JS的变量
                在一段程序的运行中,保存一个中间值使用
                例子：
                => 要计算 1*2*3
                => 要计算1*2*3*4的时候
                => 可以把1 * 2 *3的结果记录下来


               JS 定义变量
               var 变量名 = 值；
               var 定义变量的关键字
               空格 分隔变量名和关键字的 必须有
               变量名 自己起的名字 用来代表后面的一串东西
               等于号 在JS里面等于号是赋值的意思 把右边的内容给到左边的变量 
               值 定义的变量代表的内容
         */
        var ff = '1';
        var num = 3;
        console.log(ff);
        if(!(num%3)){
            console.log(1);
        }
    </script>
</body>

</html>
