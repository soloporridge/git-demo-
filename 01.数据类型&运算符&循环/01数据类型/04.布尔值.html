<body>
    <script>

        /* 
            JS 的基本数据类型 布尔值
             在 JS里面，布尔值只有两个值
             =》 true 表示真 在计算机里存储的时候是1
             =》 false 表示假 在计算里存储的时候是0
            在运算过程中有什么意义
                主要用来做判断
            例子：
                1  > 2 如果得到true表示这个表达式是真的
                       如果得到false表示这个表达式是 假的     
        */

        var t = true;
        var f = false;
        console.log(t, f);
    </script>
