<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /* 
            JS 的 基本数据类型 空
                1. Undefined 空
                    这里本应该有一个值但是没有 就是undefined
                2. null 空 
                    这里有一个空值
        */
       // 定义变量
       var n 
       //要使用 n 变量代表的值
       // 本来应该有一个值，但是没有，就是Undefined
       console.log(n);

       var nu = null;
       // 要使用nu的值
       // 打印出一个 null
       console.log(nu);
    </script>
</body>
</html>
