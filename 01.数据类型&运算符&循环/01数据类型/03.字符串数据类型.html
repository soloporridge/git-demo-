<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        /* 
            JS 的基本数据类型字符串
                在JS里面一切使用单引号''，双引号""，反引号`` 包裹的内容都是字符串
                表示一段文本内容，是一个字符一个字符链接起来的内容；
                =》 'hello'
                =》 "hello"
                => `hello`
            当在字符串里面只写数字的时候,也不是数值类型
                =》 也是字符串类型    
            在字符串里 空格也是占位置的    

        */

        var str = 'hello ';//6个字符串组成
        var str2 = "hello";
        var str3 = `hello`;

        var str4 = '123';//他不是数值而是字符串  是 1 2 3 三个字符链接在一起
        console.log(str4);
    </script>
</body>
</html>
