<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        /* 
        
            等腰三角形
                *
               * *
              * * *
             * * * *
             一个右下的直角三角形,每一个星号带一个空格
        */
        for (let i = 1; i <= 9; i++) {
            for (let k = i; k <= 9; k++) {
                document.write('&nbsp')
            }
            if (i % 2 !== 0) { }
            for (let j = 1; j <= i; j++) {
                document.write('* ')
            }
            document.write('<br/>')
        }

        /* 
        
            等腰三角形
                 *
               * * *
              * * * * *
            * * * * * * *
        
        */
        for (let i = 1; i <= 9; i++) {
            if (i % 2 ) {
                for (let k = i; k <= 9; k++) {
                    document.write('&nbsp')
                }
                for (let j = 1; j <= i; j++) {
                    document.write('* ')
                }
                document.write('<br/>')
            }


        }


    </script>
</body>

</html>
