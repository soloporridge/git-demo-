        /* 
        
            思考
                有一段代码肯定是要重复执行的
                什么时候重复执行
                 当 gbs % n ！==0 或者 gbs%m！==0；
            while 循环，满足条件就循环，不满足条件就结束
        
        */
        //    1.准备两个变量
        var n = 5;
        var m = 6;
        //    2.调整两个数的大小
        if (n > m) {
            var tmp = n;
            n = m;
            m = tmp
        }
        var gbs = m;
        // 3.循环
        while (gbs % n !== 0 || gbs % m !== 0) {
            // gbs 放大一点在来一遍
            gbs += m;
        }
        // 直到循环结束，表示gbs就是两个数的最小公倍数
        console.log(gbs);
    </script>
