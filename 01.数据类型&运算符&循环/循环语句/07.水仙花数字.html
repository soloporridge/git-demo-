<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <script>

        /* 
        
        水仙花数字
            三次自幂数
            一个数字的每一位的三次方之和，如果和这个数字一样
            那就是三次自幂数
            列子：153
            1 * 1 + 5 * 5 * 5 + 3 * 3 * 3
            1 + 125 + 27
            153
        思路
            1.循环的到 100 ~ 999 的每一个整数
            2.把每一个数字都拆开
            3.判断
        */
    //    1.循环
        for(let i = 100;i<=999;i++){
            // 2.拆数字
            var a = parseInt(i / 100)
            var b = parseInt(i % 100 / 10)
            var c = parseInt(i % 10)
            //console.log(a,b,c);
            // 3.判断是不是3次自幂数
            if(a ** 3 + b ** 3 + c ** 3 === i){
                console.log(i);
            }
        }

        // 27 的三次方根
        // 27 的三分之一次方 等于 三次根号下 27
        console.log(27 ** (1/3));

    </script>
</body>
</html>
