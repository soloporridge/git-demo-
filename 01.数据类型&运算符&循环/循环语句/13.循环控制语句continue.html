<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /* 
        
        循环控制语句 continue
            使用在循环里面的关键字
            当代码执行到 continue 关键字的时候，会结束循环的本次继续下一次
        
        */

        for(let i=1;i<=5;i++){
            // 第三个包子掉地下了
            if(i===3){
                console.log('第'+i+'包子掉地上了');
                continue;
            }
            console.log('吃了'+i+'个包子');
        }
    </script>
</body>
</html>
