    /* 
    
    辗转相除法求最大公约数
        n = 8 
        m = 5

        n / m 如果可以整除 那么公约数就是m
        如果不可以整除，继续计算 m / （n % m），如果整除，那么最大公约数 就是 n%m

        8 / 5,不能整除
         5 / 3，不能整除
         3 / 2 不能整除
         2 / 1 整除，最大公约数是1


         10 和 6 
         10 / 6，不能整除
         6 / 4，不能整除
         4 / 2，整除最大公约数是2

         15 和 6
         15 / 6 不能整除
         6 / 3 能整除
    */

    // 1.准备两个变量
    var n =8;
    var m =5;
    // 2.准备一个变量来接收最大公约数
    var gys = 1;
    // 3.判断两个数的大小
    if(n < m ){
        var tmp = n;
         n = m ;
         m = tmp
    }
    // 两个数字 n 和 m 如果可以整除，不在继续执行了，gys就找到了
    //  两个数 n 和 m 不能整除，有某一段代码再来一遍
    //  两个数 x 和 y 不能整除，某一段代码在来一遍
    //  不确定多少遍的时候，使用for循环不是很合适
    // while 循环，条件满足就执行，条件不满足就结束了
    // 条件：n % m ！== 0 继续
    while(n % m !== 0){
        // 不能整除，辗转相除
        // 把原先的 m 赋值给 n
        // 让 m 得到 原先的 n % m 的值
        var tmp = n %m;
        n = m
        m = tmp

    }
    // 循环结束的时候，m就是最大公约数
    gys = m
    console.log(8+'和'+5+'最大公约数是'+gys);
