<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>


    <script>


        /* 
        
            循环结构语句  do...while
                也是循环语句的一种
            语法
                do{
                    要重复执行的代码
                }while(条件)
            和while 循环的区别 
                不管条件是不是成立，都先执行一遍
                只在第一次条件不成立的时候会有区别
        */

        var n =1;
        /* while(n<10){
            console.log(1);
            n++
        } */

        // do...while不管条件是不是成立，都先执行一遍
        do{
            console.log(2);
            n++
        }while(n<10)
    </script>
</body>

</html>
