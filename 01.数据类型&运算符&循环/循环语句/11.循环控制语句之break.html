<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        /* 
        
            循环控制语句之 break
                当在一个循环里面执行到 break 关键字的时候
                会直接结束整个循环

        */

        for(let i =1;i<=5;i++){
            console.log('吃了' + i + '个包子');
            if(i ===  3){
                console.log('吃饱了');
                break;
            }
        }
    </script>
</body>
</html>
