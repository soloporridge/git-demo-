<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        /* 
        
            循环语句 for
                第一：将来应用是最多的
                第二：书写很诡异(代码糖)
                    代码糖：用起来方便，写起来方便，看起来不方便
                语法：
                    for(var i = 0; i < 10; i++){重复执行的代码}
                    标准语法
                        var i = 0;
                        for(;i < 10;){
                            重复执行的代码
                            i++
                        }
        */


        // for 循环
        //    初始化     判断条件 自增
        for (let i = 0; i < 3; i++) {
            // 重复执行的代码
            console.log(i);
        }
    </script>
</body>

</html>
