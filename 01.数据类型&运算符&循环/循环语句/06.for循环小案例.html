<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>


        /* 
        
                for循环小案例
                    在控制台打印所有三的倍数
                思路：
                    1.通过循环找到1~100之内所有的数字
                    2.判断每一个数字，如果是3的倍数，打印，如不是则不打印
        
        */
        for (let i = 1; i <= 100; i++) {
            if (!(i % 3)) {
                console.log(i);
            }
        }
    </script>
</body>

</html>
