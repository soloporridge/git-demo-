<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>


    <script>


        /* 
        
            循环结构语句 
                分支：根据条件来决定是不是执行某一段代码
                循环：根据条件来决定一段代码重复执行多少次
            循环成立的条件
                1.初始值，作为循环的开始
                2.条件判断，决定要不要继续循环
                3.要重复执行的代码
                4.改变初始值，为了让循环有结束
            
            while 循环的过程
                1 234 234 234 ...2

            while 循环的语法
                var n = 1
                while(条件){
                    重复执行的代码
                    n += 1
                }

         */

        //  while 
        // 1.初始化
        var n = 0;
        //  只要 n<=10 得到结果是 true 那么后面的{} 就会执行
        // 2.条件判断
        while (n <= 3) {
            // 重复执行的代码
            console.log(n);
            // 重复初始值
            n++
          
        }




    </script>
</body>

</html>
