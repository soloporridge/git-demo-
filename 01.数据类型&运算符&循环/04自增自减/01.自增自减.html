    <script>

        /* 
            自增自减运算符
                是一元运算符的一种
                一元：一个符号带一个变量就能运算

                    自增 ++
                        前置++
                            ++变量
                        后置++
                            变量++    
                    共同点
                        只要执行了，那么变量本身一定会改变(在自身的基础上加一)
                    区别：在于参与运算的时候
                        前置++ 在参与运算的时候，先改变变量本身的值，用改变以后的取进行运算      
                        后置++ 在参与运算的时候，先把变量本身的值拿个过来参与运算，然后在改变变量的值  
                    当一个运算表达式出现多个 ++ 的时候
                        按照从左到右的顺序依次一个一个的执行


                    自减 --
                        前置 --
                            --变量
                        后置--
                            变量--
                        共同点：
                            只要执行了，那么变量本身的值一定会发生改变(在自身的基础上 -1)
                    区别
                        前置 -- 在参与运算的时候，先改变变量的值，用改变以后的变量参与运算
                        后置 -- 在参与运算的时候，先把变量本身的值拿过来参与运算，然后在改变变量的值
        */

        // ++ 运算符
        var n = 5;
    //    n++;// 执行一步 后置++，执行完毕后，n的值就变6

    //    ++n;// 执行一步 ++前置 执行完毕后，n的值就是7
    //    console.log(n);

    // 使用 n++ 的运算结果 去和别的数据进行运算

    // var res = 10 + n++

        var n =5;

        var res = 10 + n-- + --n + --n + n--;
