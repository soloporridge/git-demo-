        /*
            运算符  比较运算符
                就是两个数据进行比较的符号
                1. >
                    左边大于右边得到 true
                    左边不大于右边得到 false
                2. <
                    左边不小于右边得到 true
                    左边小于右边得到 false
                3. >=
                    左边大于等于右边得到true
                    左边小于右边的false
                4. <=
                    左边小于等于右边得到true
                    左边大于右边得到false
                5. ==
                    = 比较两边的数据值是不是相等  不管数据类型 只看值
                        相等返回true
                        不相等返回false
                6. ===
                    = 比较两边的数据值是不是相等 值和数据类型都要比较
                7. !=
                    = 比较两边的数据值是不是不等 不管数据类型

                8. !==
                    = 比较两边的数据是不是 不等，值和数据类型都要比较
                    = 当数据类型不一样的时候,就是true了
         */

        */

        /*
