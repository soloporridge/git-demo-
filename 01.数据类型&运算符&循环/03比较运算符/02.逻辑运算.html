<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>

        /* 
        
            运算符  逻辑运算符
                对数据进行逻辑运算
                    1.&& 与(且)
                        运算符两侧都是 true 的时候得到true
                        只要任意一边得到false 那就是false
                    2.|| 或
                        运算符两侧任意一边是 true 得到的结果就是true
                        只有两边都是 false的时候 得到的结果就是false
                    3.! 非（取反）
                        本身是true 那么结果就是false
                        本身是false 那么结果就是true
                        双取反可以转布尔



        */
        // && 逻辑与
        console.log(true && true);
        console.log(true && false);

        // || 逻辑或
        console.log(true || true);
        console.log(true || false);
        console.log(false || false);

        // 逻辑非 !
        console.log(!false);
        console.log(!true);
        console.log(!0);
    </script>
</body>
</html>
